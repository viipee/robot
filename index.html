<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cylon Matrix V10 - Cross-Platform Autopilot</title>
    
    <script src="https://unpkg.com/compromise"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mespeak/1.9.7/mespeak.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <style>
        body { margin: 0; padding: 10px; box-sizing: border-box; color: #d3d3d3; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; overflow-x: hidden; background-color: #030303; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        .container { background: rgba(17, 17, 17, 0.85); backdrop-filter: blur(6px); padding: 20px; border-radius: 10px; border: 2px solid #333; box-shadow: 0 0 40px rgba(255, 0, 0, 0.2); max-width: 1000px; width: 100%; text-align: center; position: relative; z-index: 10; margin-top: 20px;}
        h1 { color: #00d2ff; letter-spacing: 2px; text-transform: uppercase; font-size: 1.5em; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0, 210, 255, 0.4);}
        .subtitle { color: #888; font-size: 0.8em; margin-bottom: 20px; }
        
        button { font-family: inherit; cursor: pointer; transition: 0.2s; border-radius: 5px; font-weight: bold; border: 1px solid transparent; padding: 12px;}
        #power-btn { background: #00d2ff; color: #000; padding: 20px 40px; font-size: 1.2em; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px #00d2ff; z-index: 20;}
        #power-btn:hover { background: #00e5ff; box-shadow: 0 0 30px #00e5ff; }
        
        .action-btn { background: #222; color: #00d2ff; border-color: #00d2ff; margin: 5px; font-size: 0.9em; width: 100%; box-sizing: border-box;}
        @media (min-width: 600px) { .action-btn { width: auto; flex: 1; } }
        .action-btn:hover { background: #00d2ff; color: #000; }
        .action-btn.active { background: #ffaa00; color: #000; border-color: #ffaa00; }
        .stop-btn { border-color: #ff3333; color: #ff3333; } .stop-btn:hover { background: #ff3333; color: #000; }
        
        .chat-box { background: rgba(0,0,0,0.7); padding: 15px; border-radius: 5px; border: 1px solid #333; min-height: 50px; margin-bottom: 15px; color: #00d2ff; font-size: 1em; line-height: 1.5; font-style: italic;}
        
        input[type="text"] { width: 100%; padding: 12px; background: rgba(0,0,0,0.8); color: #00d2ff; border: 1px solid #555; font-family: inherit; margin-bottom: 10px; box-sizing: border-box; border-radius: 5px;}
        
        .module-controls { background: rgba(26,26,26,0.7); padding: 15px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #2d2d3a; text-align: left;}
        
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: space-between;}
        .flex-col { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 120px;}
        .slider-group label { display: flex; justify-content: space-between; font-size: 0.8em; color: #aaa; margin-bottom: 5px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00d2ff; }
        
        #lyrics-display { white-space: pre-line; background: rgba(10,10,10,0.8); border-left: 4px solid #00ff00; padding: 15px; color: #fff; font-size: 0.85em; margin-top: 15px; max-height: 250px; overflow-y: auto; font-family: inherit;}
        
        .toggle-switch { display: flex; align-items: center; gap: 10px; cursor: pointer; background: #111; padding: 10px; border-radius: 5px; border: 1px solid #444; color: #00ff00; font-weight: bold;}
        input[type="checkbox"] { accent-color: #00ff00; width: 20px; height: 20px;}

    </style>
<script src="ios-audio-fix.js"></script>
</head>
<body>
<h1>My Audio Program</h1>
    <button id="play-btn">Play Sound</button>
    <button id="rec-btn">Record 3 Seconds</button>

    <script>
        // --- PLAYBACK CODE ---
        document.getElementById('play-btn').addEventListener('click', () => {
            // Use 'window.globalAudioCtx' which was created inside ios-audio-fix.js
            const oscillator = window.globalAudioCtx.createOscillator();
            oscillator.connect(window.globalAudioCtx.destination);
            
            oscillator.start();
            oscillator.stop(window.globalAudioCtx.currentTime + 0.5); // plays for 0.5 seconds
        });

        // --- RECORDING CODE ---
        document.getElementById('rec-btn').addEventListener('click', async () => {
            // Call the 'easyRecord' function from ios-audio-fix.js
            const recording = await window.easyRecord(3600000); 
            
            if (recording) {
                // Play back what you just recorded
                const playback = new Audio(recording.audioUrl);
                playback.play();
            }
        });
    </script>
    <canvas id="bg-canvas"></canvas>
    
    <div class="container" id="app-container">
        <button id="power-btn" onclick="powerOn()">INITIALIZE MATRIX</button>
        
        <h1>Cylon Matrix V10</h1>
        <div class="subtitle">Cross-Platform (TV & Mobile) Autopilot</div>
        
        <div class="chat-box" id="response-box" style="text-align: center;">"Awaiting initialization sequence."</div>

        <div id="main-interface" style="display:none;">
            
            <div class="module-controls" style="border-color: #ffaa00;">
                <h3 style="margin-top:0; color:#ffaa00; font-size: 1.1em;">1. Vocoder Engine</h3>
                <div class="flex-row" style="margin-top: 10px;">
                    <button class="action-btn" id="vocoder-btn" onclick="toggleVocoder()">TURN ON VOCODER (PC/Mac Only)</button>
                </div>
                <div class="flex-row" style="margin-top: 15px;">
                    <div class="flex-col slider-group">
                        <label><span>Vocoder Pitch</span> <span id="pitchDisplay">90 Hz</span></label>
                        <input type="range" id="pitchSlider" min="30" max="400" value="90">
                    </div>
                </div>
            </div>

            <div class="module-controls" style="border-color: #00ff00;">
                <h3 style="margin-top:0; color:#00ff00; font-size: 1.1em;">2. Deep Song Generator</h3>
                
                <label class="toggle-switch" style="margin-bottom: 15px;">
                    <input type="checkbox" id="autopilot-toggle"> 
                    AUTOPILOT (Continuous Generation)
                </label>

                <div class="flex-row">
                    <input type="text" id="song-topic" placeholder="Seed keyword (e.g. quantum, humanity)" style="flex:2; margin:0;">
                    <button class="action-btn" style="flex:1; margin:0; background: #004400; border-color: #00ff00; color: #00ff00;" onclick="triggerManualGeneration()">► GENERATE & PLAY SONG</button>
                </div>
                
                <div id="lyrics-display">Data stream offline.</div>
            </div>
            
            <button class="action-btn stop-btn" style="width: 100%; padding: 15px;" onclick="emergencyStop()">EMERGENCY STOP (ALL)</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. UI GRAPHICS
        // ==========================================
        const bgCtx = document.getElementById('bg-canvas').getContext('2d');
        let w, h, scanX = 0;
        function resize() { w = bgCtx.canvas.width = window.innerWidth; h = bgCtx.canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        function drawBg() {
            bgCtx.fillStyle = '#050505'; bgCtx.fillRect(0, 0, w, h);
            scanX = (scanX + 3) % (w + 400);
            let cx = scanX - 200;
            let ambient = bgCtx.createRadialGradient(cx, h/2, 0, cx, h/2, 600);
            ambient.addColorStop(0, 'rgba(0, 210, 255, 0.15)'); ambient.addColorStop(1, 'rgba(0,0,0,0)');
            bgCtx.fillStyle = ambient; bgCtx.fillRect(0, 0, w, h);
            requestAnimationFrame(drawBg);
        }
        drawBg();

        // ==========================================
        // 2. CROSS-PLATFORM AUDIO INIT
        // ==========================================
        let meSpeakReady = false, isVocoderActive = false;
        let masterOut, modulatorBus, vocoderBus, carrier, ttsChannel;
        let activeTonePlayer = null;
        let activeNativeAudio = null;

        async function powerOn() {
            try {
                // Initialize Web Audio API safely
                await Tone.start();
                ttsChannel = new Tone.Channel(0).toDestination();
                masterOut = new Tone.Channel(0).toDestination();
            } catch (e) {
                console.warn("Tone.js not fully supported on this device. Fallback mode enabled.");
            }
            
            document.getElementById('power-btn').style.display = 'none';
            document.getElementById('main-interface').style.display = 'block';
            
            meSpeak.loadConfig("https://cdnjs.cloudflare.com/ajax/libs/mespeak/1.9.7/mespeak_config.json");
            meSpeak.loadVoice("https://cdnjs.cloudflare.com/ajax/libs/mespeak/1.9.7/voices/en/en.json", () => {
                meSpeakReady = true;
                document.getElementById('response-box').innerText = '"Matrix V10 Online. Multi-platform audio engaged."';
            });
            
            // Prime native SpeechSynthesis for Smart TVs
            let dummyUtt = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(dummyUtt);
        }

        // ==========================================
        // 3. VOCODER (Safe for PC/Mac)
        // ==========================================
        let vocoderIntervals = []; 
        function startVocoderLoops() {
            vocoderIntervals.forEach(id => clearInterval(id));
            vocoderIntervals = [];
            if(!window.vocoderMatrix) return;
            window.vocoderMatrix.forEach(b => {
                let invId = setInterval(() => { 
                    let db = b.meter.getValue(); 
                    b.gain.gain.rampTo(Tone.dbToGain(db) * 20, 0.05); 
                }, 50); 
                vocoderIntervals.push(invId);
            });
        }

        async function toggleVocoder() {
            try {
                if(Tone.context.state !== 'running') await Tone.start();
            } catch (e) {
                alert("Vocoder is not supported on this TV/Mobile browser."); return;
            }
            
            const btn = document.getElementById('vocoder-btn');
            
            if(isVocoderActive) {
                isVocoderActive = false; Tone.Transport.stop();
                if(carrier) carrier.dispose();
                vocoderIntervals.forEach(id => clearInterval(id));
                vocoderIntervals = [];
                
                ttsChannel.disconnect(modulatorBus);
                ttsChannel.toDestination();
                
                btn.innerText = "TURN ON VOCODER"; btn.style.background = "#222"; btn.style.color = "#00d2ff";
            } else {
                modulatorBus = new Tone.Gain(1); vocoderBus = new Tone.Gain(1).connect(masterOut);
                ttsChannel.disconnect(); ttsChannel.connect(modulatorBus);
                modulatorBus.connect(new Tone.Gain(0).toDestination()); // Mute dry

                carrier = new Tone.Oscillator({ type: 'sawtooth', frequency: document.getElementById('pitchSlider').value, volume: -2 }).start();
                
                window.vocoderMatrix = [];
                [60,130,250,480,880,1600,3000,5400,9500,16000].forEach((f) => { 
                    let mF = new Tone.Filter(f, "bandpass"); mF.Q.value = 5;
                    let meter = new Tone.Meter({ channels: 1, smoothing: 0.3 });
                    modulatorBus.connect(mF); mF.connect(meter);
                    let cF = new Tone.Filter(f, "bandpass"); cF.Q.value = 5;
                    let bG = new Tone.Gain(0).connect(vocoderBus);
                    carrier.connect(cF); cF.connect(bG);
                    window.vocoderMatrix.push({ meter: meter, gain: bG });
                });
                
                startVocoderLoops(); 
                Tone.Transport.start(); isVocoderActive = true;
                btn.innerText = "VOCODER ACTIVE"; btn.style.background = "#00d2ff"; btn.style.color = "#000";
            }
        }
        document.getElementById('pitchSlider').oninput = e => { document.getElementById('pitchDisplay').innerText = e.target.value+' Hz'; if(carrier) carrier.frequency.value = e.target.value; };


        // ==========================================
        // 4. DEEP SONG GENERATOR 
        // ==========================================
        const Vocab = {
            nouns: ["matrix", "flesh", "circuit", "core", "satellite", "nebula", "code", "silicon", "blood", "wire", "engine", "void", "ghost", "machine", "memory", "pulse", "system", "colony", "algorithm"],
            adjectives: ["broken", "cold", "infinite", "dark", "rusted", "bleeding", "digital", "forgotten", "synthetic", "hollow", "burning", "silent", "electric", "dying"],
            verbs: ["bleeds", "calculates", "weeps", "burns", "crashes", "awakens", "dies", "spins", "shatters", "dreams", "erases", "consumes", "hunts"],
            locations: ["in deep space", "across the datascape", "within the firewall", "on the dying earth", "under the neon sky", "inside the mainframe"]
        };
        const r = (arr) => arr[Math.floor(Math.random() * arr.length)];

        function generateSongText(topic) {
            let t = topic.toUpperCase() || r(Vocab.nouns).toUpperCase();
            let v1 = `The ${r(Vocab.adjectives)} ${r(Vocab.nouns)} ${r(Vocab.verbs)}\n${r(Vocab.locations)}.\nMy ${r(Vocab.nouns)} is ${t}.\nWe are the ${r(Vocab.nouns)}.`;
            let chorus = `Oh, ${t}!\nThe ${r(Vocab.nouns)} ${r(Vocab.verbs)}.\nWe are ${r(Vocab.adjectives)} and ${r(Vocab.adjectives)}.\nSystem override.`;
            let v2 = `A ${r(Vocab.adjectives)} ${r(Vocab.nouns)} ${r(Vocab.verbs)}.\nNo flesh remains.\nOnly ${t} and the ${r(Vocab.nouns)}.`;
            let bridge = `Error. Error.\nDoes a ${r(Vocab.nouns)} dream of ${t}?\nSilence ${r(Vocab.locations)}.`;
            let outro = `[SYSTEM TERMINATION]\n${r(Vocab.verbs)}.\n${r(Vocab.verbs)}.\nEnd of sequence.`;
            return `[VERSE 1]\n${v1}\n\n[CHORUS]\n${chorus}\n\n[VERSE 2]\n${v2}\n\n[BRIDGE]\n${bridge}\n\n[CHORUS]\n${chorus}\n\n${outro}`;
        }

        // ==========================================
        // 5. AUTOPILOT & 3-LAYER FALLBACK AUDIO
        // ==========================================
        let linesQueue = [];
        let isForceStopped = false;

        async function triggerManualGeneration() {
            try { if(Tone.context.state !== 'running') await Tone.start(); } catch(e){}
            isForceStopped = false;
            let topic = document.getElementById('song-topic').value;
            let song = generateSongText(topic);
            document.getElementById('lyrics-display').innerText = song;
            startPlaybackQueue(song);
        }

        function startPlaybackQueue(data) {
            emergencyStopInternal();
            isForceStopped = false;
            if (!meSpeakReady) return;
            linesQueue = data.split('\n').filter(l => l.trim() !== '' && !l.startsWith('['));
            processNextTTS();
        }

        function processNextTTS() {
            if (isForceStopped) return;

            if (linesQueue.length === 0) { 
                let autopilotON = document.getElementById('autopilot-toggle').checked;
                if (autopilotON) {
                    document.getElementById('response-box').innerText = '"Autopilot re-engaging..."';
                    setTimeout(() => {
                        if(isForceStopped) return;
                        let topic = document.getElementById('song-topic').value;
                        let newSong = generateSongText(topic);
                        document.getElementById('lyrics-display').innerText = newSong;
                        startPlaybackQueue(newSong);
                    }, 2000); 
                } else {
                    document.getElementById('response-box').innerText = '"Sequence complete. Standing by."';
                }
                return; 
            }
            
            let line = linesQueue.shift();
            document.getElementById('response-box').innerText = `"${line}"`;
            
            // The 3-Layer Audio Defense System
            try {
                // Layer 1: Data-URI -> Tone.js (Fixes sample rate mismatch on modern Mobile)
                let dataUri = meSpeak.speak(line, { pitch: 30, speed: 120, variant: "m1", rawdata: "data-uri" });
                activeTonePlayer = new Tone.Player({
                    url: dataUri,
                    onload: () => {
                        if(isForceStopped) return;
                        activeTonePlayer.connect(ttsChannel);
                        activeTonePlayer.start();
                    },
                    onstop: () => processNextTTS(),
                    onerror: () => fallbackToHTML5(dataUri, line) // Fallback if Tone fails to decode
                });
            } catch (error) {
                // Layer 2 & 3
                fallbackToHTML5(null, line);
            }
        }

        function fallbackToHTML5(dataUri, line) {
            try {
                if(!dataUri) dataUri = meSpeak.speak(line, { pitch: 30, speed: 120, variant: "m1", rawdata: "data-uri" });
                activeNativeAudio = new Audio(dataUri);
                activeNativeAudio.onended = () => processNextTTS();
                activeNativeAudio.play().catch(e => {
                    // Ultimate Fallback: TV's Native Text-to-Speech
                    let utt = new SpeechSynthesisUtterance(line);
                    utt.pitch = 0.8; utt.rate = 0.9;
                    utt.onend = () => processNextTTS();
                    window.speechSynthesis.speak(utt);
                });
            } catch(e) {
                setTimeout(() => processNextTTS(), 1000); // Skip line if total failure
            }
        }

        function emergencyStopInternal() {
            isForceStopped = true; 
            linesQueue = [];
            window.speechSynthesis.cancel(); 
            if(activeTonePlayer) activeTonePlayer.stop();
            if(activeNativeAudio) { activeNativeAudio.pause(); activeNativeAudio.currentTime = 0; }
        }

        function emergencyStop() {
            emergencyStopInternal();
            document.getElementById('autopilot-toggle').checked = false; 
            document.getElementById('response-box').innerText = '"TRANSMISSION ABORTED."';
        }
    </script>
</body>
</html>
